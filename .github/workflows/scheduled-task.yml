name: 定时推送AI新闻

on:
  schedule:
    # 每 3 分钟执行一次
    - cron: '*/5 * * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  pushAINews:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 执行脚本
        run: node aiNews.js
